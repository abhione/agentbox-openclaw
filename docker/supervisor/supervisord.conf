[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
user=root

[program:vnc]
command=/usr/bin/vncserver :1 -geometry 1920x1080 -depth 24 -SecurityTypes None -localhost no
user=agent
autostart=true
autorestart=true
stdout_logfile=/tmp/vnc.log
stderr_logfile=/tmp/vnc-error.log
environment=HOME="/home/agent",USER="agent"
startsecs=2

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5901 --listen 6080
user=agent
autostart=true
autorestart=true
stdout_logfile=/tmp/novnc.log
stderr_logfile=/tmp/novnc-error.log
startsecs=5

[program:openclaw]
command=openclaw gateway run
user=agent
directory=/workspace
autostart=true
autorestart=true
stdout_logfile=/tmp/openclaw.log
stderr_logfile=/tmp/openclaw-error.log
environment=HOME="/home/agent",USER="agent",DISPLAY=":1"
startsecs=3
