# Box Claws backend on Fly.io — single always-on machine (state is local to
# the volume: boxes.json + docker images + agent containers).
#
# Public surface: ONLY the token-guarded VNC proxy (:8080, mapped to 443/80).
# The dashboard API (:3457) has no auth and is reached exclusively over Fly
# private networking: http://agentwork-boxes.internal:3457
app = "agentwork-boxes"
primary_region = "sjc"

swap_size_mb = 4096

[build]
  dockerfile = "fly/Dockerfile"

[env]
  # ~/.agentbox lands on the persistent volume
  HOME = "/data"
  VNC_PROXY_PORT = "8080"
  VNC_PUBLIC_BASE = "https://agentwork-boxes.fly.dev"

[mounts]
  source = "data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "90s"
    method = "get"
    path = "/vnc/health-check"

[[vm]]
  size = "shared-cpu-4x"
  memory = "8192mb"
